name: lint-check
description: Configure docs-only build metadata and verify Markdown formatting
inputs:
  artifact_name:
    description: Failure artifact name
    required: true
  build_dir:
    description: Build directory
    required: false
    default: build
  setup_msvc:
    description: Set to true on Windows runners that need MSVC environment setup
    required: false
    default: 'false'
  source_dir:
    description: Source directory to configure
    required: false
    default: .
runs:
  using: composite
  steps:
    - name: Setup MSVC Developer Command Prompt
      if: ${{ inputs.setup_msvc == 'true' }}
      uses: TheMrMilchmann/setup-msvc-dev@v4.0.0
      with:
        arch: x64
    - name: Configure
      shell: bash
      run: |
        cmake -S "${{ inputs.source_dir }}" -B "${{ inputs.build_dir }}" -DDINGO_DEVELOPMENT_MODE=ON -DDINGO_TESTING_ENABLED=OFF -DDINGO_BENCHMARK_ENABLED=OFF -DDINGO_EXAMPLES_ENABLED=OFF
    - name: Check Formatting
      shell: bash
      env:
        PIP_BREAK_SYSTEM_PACKAGES: 1
      run: |
        python -m pip install mdformat
        cmake --build "${{ inputs.build_dir }}" -t md-verify
    - name: Upload Failure Artifacts
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4.6.2
      with:
        name: ${{ inputs.artifact_name }}
        if-no-files-found: ignore
        path: |
          ${{ inputs.build_dir }}/CMakeFiles/CMakeOutput.log
          ${{ inputs.build_dir }}/CMakeFiles/CMakeError.log

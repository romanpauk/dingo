name: lint-check
description: Configure lint metadata and verify source and Markdown formatting
inputs:
  artifact_name:
    description: Failure artifact name
    required: true
  build_dir:
    description: Build directory
    required: false
    default: build
  setup_msvc:
    description: Set to true on Windows runners that need MSVC environment setup
    required: false
    default: 'false'
  source_dir:
    description: Source directory to configure
    required: false
    default: .
runs:
  using: composite
  steps:
    - name: Setup MSVC Developer Command Prompt
      if: ${{ inputs.setup_msvc == 'true' }}
      uses: TheMrMilchmann/setup-msvc-dev@v4.0.0
      with:
        arch: x64
    - name: Setup uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        version: 0.11.3
        enable-cache: true
        cache-dependency-glob: |
          ${{ inputs.source_dir }}/pyproject.toml
          ${{ inputs.source_dir }}/uv.lock
    - name: Run Python tool tests
      shell: bash
      run: |
        cd "${{ inputs.source_dir }}"
        uv run --locked python tools/release_flow_test.py
    - name: Resolve clang-format
      shell: bash
      run: |
        cd "${{ inputs.source_dir }}"
        CLANG_FORMAT_EXE="$(uv run --locked python -c 'import shutil; print(shutil.which("clang-format") or "")')"
        if [ -z "$CLANG_FORMAT_EXE" ]; then
          echo "clang-format was not found in the locked uv environment" >&2
          exit 1
        fi
        uv run --locked clang-format --version
        echo "DINGO_CLANG_FORMAT_EXE=$CLANG_FORMAT_EXE" >> "$GITHUB_ENV"
    - name: Install clang-tidy
      if: ${{ inputs.setup_msvc != 'true' }}
      shell: bash
      run: |
        if ! command -v clang-tidy-21 >/dev/null 2>&1; then
          curl --fail --location --silent --show-error \
            https://apt.llvm.org/llvm.sh --output /tmp/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 21
          sudo apt-get install -y clang-tidy-21
        fi
        clang-tidy-21 --version
    - name: Configure
      shell: bash
      run: |
        DINGO_EXAMPLES_ENABLED=OFF
        if [ "${{ inputs.setup_msvc }}" != "true" ]; then
          DINGO_EXAMPLES_ENABLED=ON
        fi
        cmake -S "${{ inputs.source_dir }}" -B "${{ inputs.build_dir }}" -DDINGO_DEVELOPMENT_MODE=ON -DDINGO_TESTING_ENABLED=OFF -DDINGO_BENCHMARK_ENABLED=OFF -DDINGO_EXAMPLES_ENABLED="$DINGO_EXAMPLES_ENABLED" -DDINGO_CLANG_FORMAT_VERSION=21 -DDINGO_CLANG_FORMAT_EXE="$DINGO_CLANG_FORMAT_EXE" -DDINGO_CLANG_TIDY_VERSION=21
    - name: Check Quality Gate
      shell: bash
      run: |
        cmake --build "${{ inputs.build_dir }}" -t check
    - name: Upload Failure Artifacts
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4.6.2
      with:
        name: ${{ inputs.artifact_name }}
        if-no-files-found: ignore
        path: |
          ${{ inputs.build_dir }}/CMakeFiles/CMakeOutput.log
          ${{ inputs.build_dir }}/CMakeFiles/CMakeError.log

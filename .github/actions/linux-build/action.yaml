name: linux-build
description: Configure, build, test, and FetchContent-verify a Linux CMake build
inputs:
  build_dir:
    description: Main CMake build directory
    required: false
    default: build
  build_type:
    description: CMake build type
    required: true
  ccache_enabled:
    description: Enable ccache for this build
    required: false
    default: 'ON'
  ccache_key:
    description: Cache key for ccache-action
    required: true
  container_image:
    description: Optional local container image to run the Linux build inside
    required: false
    default: ''
  compiler_cc:
    description: C compiler binary
    required: true
  compiler_cxx:
    description: C++ compiler binary
    required: true
  matrix_profile:
    description: Generated matrix execution profile
    required: false
    default: portable
  fetchcontent_dir:
    description: FetchContent build directory
    required: false
    default: fetchcontent-build
  sanitizer:
    description: DINGO_SANITIZER value
    required: true
  source_dir:
    description: Source directory to configure/build
    required: false
    default: .
  std:
    description: C++ standard
    required: true
runs:
  using: composite
  steps:
    - name: Setup uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        version: 0.11.3
        enable-cache: true
        cache-dependency-glob: |
          ${{ inputs.source_dir }}/pyproject.toml
          ${{ inputs.source_dir }}/uv.lock
    - name: CCache
      if: ${{ inputs.ccache_enabled == 'ON' }}
      uses: hendrikmuhs/ccache-action@v1.2.23
      with:
        key: ${{ inputs.ccache_key }}
        restore-keys: ${{ inputs.ccache_key }}
        max-size: ${{ env.CCACHE_MAX_SIZE }}
        evict-old-files: job
    - name: Install Compiler
      if: ${{ inputs.container_image == '' }}
      shell: bash
      run: |
        command -v ${{ inputs.compiler_cc }} >/dev/null || sudo apt-get install -y ${{ inputs.compiler_cc }}
        command -v ${{ inputs.compiler_cxx }} >/dev/null || sudo apt-get install -y ${{ inputs.compiler_cxx }}
    - name: Configure
      if: ${{ inputs.container_image == '' }}
      shell: bash
      env:
        CC: ${{ inputs.compiler_cc }}
        CXX: ${{ inputs.compiler_cxx }}
      run: |
        cmake -S "${{ inputs.source_dir }}" -B "${{ inputs.build_dir }}" -DDINGO_DEVELOPMENT_MODE=ON -DDINGO_BENCHMARK_ENABLED=OFF -DDINGO_CCACHE=${{ inputs.ccache_enabled }} -DDINGO_MATRIX_PROFILE=${{ inputs.matrix_profile }} -DDINGO_TREAT_WARNINGS_AS_ERRORS=ON -DDINGO_SANITIZER=${{ inputs.sanitizer }} -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DCMAKE_CXX_STANDARD=${{ inputs.std }}
    - name: Build
      if: ${{ inputs.container_image == '' }}
      shell: bash
      run: |
        cmake --build "${{ inputs.build_dir }}" -j "$BUILD_JOBS"
    - name: Test
      if: ${{ inputs.container_image == '' }}
      shell: bash
      env:
        ASAN_OPTIONS: use_sigaltstack=false
      run: |
        cd "${{ inputs.build_dir }}" && ctest --verbose --output-on-failure
    - name: Report and reclaim main build outputs
      if: ${{ inputs.container_image == '' }}
      shell: bash
      run: |
        df -h .
        du -sh "${{ inputs.build_dir }}"
        du -ch "${{ inputs.build_dir }}"/test/CMakeFiles/dingo_matrix_test_dependency_composition_*.dir 2>/dev/null | tail -1 || true
        cmake --build "${{ inputs.build_dir }}" --target clean
    - name: FetchContent
      if: ${{ inputs.container_image == '' }}
      shell: bash
      run: |
        cmake -S "${{ inputs.source_dir }}/test/fetchcontent" -B "${{ inputs.fetchcontent_dir }}" -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} -DCMAKE_CXX_STANDARD=${{ inputs.std }}
        cmake --build "${{ inputs.fetchcontent_dir }}" -j "$BUILD_JOBS"
    - name: Configure, build, test, and FetchContent in container
      if: ${{ inputs.container_image != '' }}
      shell: bash
      env:
        CONTAINER_IMAGE: ${{ inputs.container_image }}
      run: |
        set -euo pipefail

        mkdir -p "$GITHUB_WORKSPACE/.ccache"
        echo "Using ccache directory: $GITHUB_WORKSPACE/.ccache"

        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -e BUILD_JOBS="${BUILD_JOBS}" \
          -e CCACHE_DIR=/ccache \
          -e DINGO_CCACHE=${{ inputs.ccache_enabled }} \
          -e DINGO_MATRIX_PROFILE=${{ inputs.matrix_profile }} \
          -e CC="${{ inputs.compiler_cc }}" \
          -e CXX="${{ inputs.compiler_cxx }}" \
          -v "$GITHUB_WORKSPACE:/workspace" \
          -v "$GITHUB_WORKSPACE/.ccache:/ccache" \
          -w /workspace \
          "${CONTAINER_IMAGE}" \
          bash -lc '
            set -euo pipefail

            command -v uv
            uv --version

            if [[ "${DINGO_CCACHE}" == "ON" ]]; then
              echo "::group::Initial ccache stats"
              ccache --show-stats --verbose
              ccache --zero-stats
              echo "::endgroup::"
            fi

            cmake -S "/workspace/${{ inputs.source_dir }}" \
              -B "/workspace/${{ inputs.build_dir }}" \
              -DDINGO_DEVELOPMENT_MODE=ON \
              -DDINGO_BENCHMARK_ENABLED=OFF \
              -DDINGO_CCACHE="${DINGO_CCACHE}" \
              -DDINGO_MATRIX_PROFILE="${DINGO_MATRIX_PROFILE}" \
              -DDINGO_TREAT_WARNINGS_AS_ERRORS=ON \
              -DDINGO_SANITIZER=${{ inputs.sanitizer }} \
              -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
              -DCMAKE_CXX_STANDARD=${{ inputs.std }}

            cmake --build "/workspace/${{ inputs.build_dir }}" -j "$BUILD_JOBS"

            if [[ "${DINGO_CCACHE}" == "ON" ]]; then
              echo "::group::Main build ccache stats"
              ccache --show-stats --verbose
              echo "::endgroup::"
            fi

            cd "/workspace/${{ inputs.build_dir }}"
            ASAN_OPTIONS=use_sigaltstack=false ctest --verbose --output-on-failure
            cd /workspace

            df -h .
            du -sh "/workspace/${{ inputs.build_dir }}"
            du -ch "/workspace/${{ inputs.build_dir }}"/test/CMakeFiles/dingo_matrix_test_dependency_composition_*.dir 2>/dev/null | tail -1 || true
            cmake --build "/workspace/${{ inputs.build_dir }}" --target clean

            cmake -S "/workspace/${{ inputs.source_dir }}/test/fetchcontent" \
              -B "/workspace/${{ inputs.fetchcontent_dir }}" \
              -DDINGO_CCACHE="${DINGO_CCACHE}" \
              -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
              -DCMAKE_CXX_STANDARD=${{ inputs.std }}

            cmake --build "/workspace/${{ inputs.fetchcontent_dir }}" -j "$BUILD_JOBS"

            if [[ "${DINGO_CCACHE}" == "ON" ]]; then
              echo "::group::Final ccache stats"
              ccache --show-stats --verbose
              echo "::endgroup::"
            fi
          '
    - name: Upload Failure Artifacts
      if: ${{ failure() }}
      uses: actions/upload-artifact@v7.0.1
      with:
        name: failure-${{ inputs.ccache_key }}
        if-no-files-found: ignore
        path: |
          ${{ inputs.build_dir }}/CMakeFiles/CMakeOutput.log
          ${{ inputs.build_dir }}/CMakeFiles/CMakeError.log
          ${{ inputs.build_dir }}/Testing/Temporary
          ${{ inputs.fetchcontent_dir }}/CMakeFiles/CMakeOutput.log
          ${{ inputs.fetchcontent_dir }}/CMakeFiles/CMakeError.log

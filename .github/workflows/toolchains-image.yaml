name: toolchains-image

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      toolchain:
        description: Toolchain selector for docker/ubuntu25-toolchains/Containerfile
        required: false
        default: gcc-14
        type: string
  push:
    branches:
      - master
    paths:
      - .github/workflows/toolchains-image.yaml
      - docker/ubuntu25-toolchains/**
  pull_request:
    paths:
      - .github/workflows/toolchains-image.yaml
      - docker/ubuntu25-toolchains/**

jobs:
  build:
    name: build ${{ inputs.toolchain || 'gcc-14' }} toolchains image
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      TOOLCHAIN: ${{ inputs.toolchain || 'gcc-14' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Build image
        uses: docker/build-push-action@v6.18.0
        with:
          context: docker/ubuntu25-toolchains
          file: docker/ubuntu25-toolchains/Containerfile
          build-args: TOOLCHAIN=${{ env.TOOLCHAIN }}
          push: false
          tags: dingo-toolchains:ubuntu-25.04-${{ env.TOOLCHAIN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: toolchain-images
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_dispatch:
  pull_request:
    paths:
      - docker/ubuntu25-toolchains/**
      - .github/actions/linux-build/action.yaml
      - .github/workflows/build-reusable.yaml
      - .github/workflows/toolchain-images.yaml
  push:
    branches:
      - master
    paths:
      - docker/ubuntu25-toolchains/**
      - .github/actions/linux-build/action.yaml
      - .github/workflows/build-reusable.yaml
      - .github/workflows/toolchain-images.yaml

jobs:
  linux-toolchain-smoke:
    name: linux image / ${{ matrix.compiler.toolchain }} / std-23
    timeout-minutes: 60
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - toolchain: gcc-15
            cc: gcc-15
            cxx: g++-15
            build_dir: build-gcc15
          - toolchain: clang-20
            cc: clang-20
            cxx: clang++-20
            build_dir: build-clang20
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Build selected toolchain image
        uses: docker/build-push-action@v6.18.0
        with:
          context: docker/ubuntu25-toolchains
          file: docker/ubuntu25-toolchains/Containerfile
          build-args: TOOLCHAIN=${{ matrix.compiler.toolchain }}
          load: true
          tags: dingo-toolchains:ubuntu-25.04-${{ matrix.compiler.toolchain }}
          cache-from: type=gha,scope=toolchain-smoke-${{ matrix.compiler.toolchain }}
          cache-to: type=gha,mode=max,scope=toolchain-smoke-${{ matrix.compiler.toolchain }}

      - name: Smoke test container command
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            dingo-toolchains:ubuntu-25.04-${{ matrix.compiler.toolchain }} \
            bash -lc 'set -euxo pipefail
              export NINJA_STATUS="[%f/%t %es] "
              cmake -S /workspace -B /workspace/${{ matrix.compiler.build_dir }} -G Ninja \
              -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
              -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
              -DDINGO_DEVELOPMENT_MODE=ON \
              -DDINGO_BENCHMARK_ENABLED=OFF && \
              cmake --build /workspace/${{ matrix.compiler.build_dir }} --verbose -j"$(nproc)" && \
              ctest --test-dir /workspace/${{ matrix.compiler.build_dir }} --output-on-failure'

      - name: Upload Failure Artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: failure-toolchain-smoke-${{ matrix.compiler.toolchain }}
          if-no-files-found: ignore
          path: |
            ${{ matrix.compiler.build_dir }}/CMakeFiles/CMakeOutput.log
            ${{ matrix.compiler.build_dir }}/CMakeFiles/CMakeError.log
            ${{ matrix.compiler.build_dir }}/Testing/Temporary

  msvc-wine-image:
    name: msvc-wine image build
    timeout-minutes: 45
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Build msvc-wine toolchain image
        uses: docker/build-push-action@v6.18.0
        with:
          context: docker/ubuntu25-toolchains
          file: docker/ubuntu25-toolchains/Containerfile
          build-args: TOOLCHAIN=msvc-wine
          load: true
          tags: dingo-toolchains:ubuntu-25.04-msvc-wine
          cache-from: type=gha,scope=toolchain-smoke-msvc-wine
          cache-to: type=gha,mode=max,scope=toolchain-smoke-msvc-wine


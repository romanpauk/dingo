name: windows-arm64
on:
  workflow_call:
    inputs:
      source_artifact_name:
        required: false
        type: string
        default: ''
      vs_label:
        required: true
        type: string
      cross_runner:
        required: true
        type: string
      cross_generator:
        required: true
        type: string
      config_id:
        required: true
        type: string
      config_label:
        required: true
        type: string
      std:
        required: true
        type: number

env:
  BUILD_JOBS: ${{ vars.DINGO_BUILD_JOBS || '4' }}
  CCACHE_MAX_SIZE: ${{ vars.DINGO_CCACHE_MAX_SIZE || '700M' }}

jobs:
  cross:
    name: cross-build
    timeout-minutes: 45
    runs-on: ${{ inputs.cross_runner }}
    steps:
      - name: Setup MSVC Developer Command Prompt
        uses: TheMrMilchmann/setup-msvc-dev@v4.0.0
        with:
          arch: amd64_arm64
      - name: Checkout workflow repo
        uses: actions/checkout@v7.0.0
      - name: Initialize source dir
        shell: bash
        run: |
          echo "SOURCE_DIR=." >> "$GITHUB_ENV"
      - name: Download release source
        if: ${{ inputs.source_artifact_name != '' }}
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ inputs.source_artifact_name }}
          path: release-artifacts
      - name: Extract release source
        if: ${{ inputs.source_artifact_name != '' }}
        shell: bash
        run: |
          mkdir -p release-src
          tar -xzf release-artifacts/release-source.tar.gz -C release-src
          echo "SOURCE_DIR=release-src" >> "$GITHUB_ENV"
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: 0.11.3
          enable-cache: true
          cache-dependency-glob: |
            ${{ env.SOURCE_DIR }}/pyproject.toml
            ${{ env.SOURCE_DIR }}/uv.lock
      - name: CCache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: ${{ inputs.vs_label }}-arm64-${{ inputs.config_id }}-${{ inputs.std }}
          max-size: ${{ env.CCACHE_MAX_SIZE }}
          evict-old-files: job
      - name: Configure
        shell: pwsh
        run: |
          cmake -S "${{ env.SOURCE_DIR }}" -B build -G "${{ inputs.cross_generator }}" -A ARM64 -DDINGO_DEVELOPMENT_MODE=ON -DDINGO_BENCHMARK_ENABLED=OFF -DDINGO_EXAMPLES_ENABLED=OFF -DDINGO_CCACHE=ON -DDINGO_MATRIX_PROFILE=portable -DDINGO_TREAT_WARNINGS_AS_ERRORS=ON -DCMAKE_BUILD_TYPE=${{ inputs.config_id }} -DCMAKE_CXX_STANDARD=${{ inputs.std }}
      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config ${{ inputs.config_id }} -j $env:BUILD_JOBS -- /nodeReuse:false
      - name: Run Compile-Only Tests
        shell: pwsh
        run: |
          ctest --test-dir build --verbose --output-on-failure -C ${{ inputs.config_id }} -L compile-only
      - name: Upload ARM64 Test Build
        uses: actions/upload-artifact@v7.0.1
        with:
          name: native-test-${{ inputs.vs_label }}-arm64-std-${{ inputs.std }}-${{ inputs.config_label }}
          if-no-files-found: error
          path: |
            build/test/${{ inputs.config_id }}
      - name: FetchContent
        shell: pwsh
        run: |
          cmake -S "${{ env.SOURCE_DIR }}/test/fetchcontent" -B fetchcontent-build -G "${{ inputs.cross_generator }}" -A ARM64 -DCMAKE_BUILD_TYPE=${{ inputs.config_id }} -DCMAKE_CXX_STANDARD=${{ inputs.std }}
          cmake --build fetchcontent-build --config ${{ inputs.config_id }} -j $env:BUILD_JOBS -- /nodeReuse:false
      - name: Upload Failure Artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: failure-${{ inputs.vs_label }}-arm64-cross-msvc-std-${{ inputs.std }}-${{ inputs.config_label }}
          if-no-files-found: ignore
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
            build/Testing/Temporary
            fetchcontent-build/CMakeFiles/CMakeOutput.log
            fetchcontent-build/CMakeFiles/CMakeError.log

  native-test:
    name: native-ctest
    timeout-minutes: 45
    needs: cross
    runs-on: windows-11-arm
    steps:
      - name: Download ARM64 Test Build
        uses: actions/download-artifact@v8.0.1
        with:
          name: native-test-${{ inputs.vs_label }}-arm64-std-${{ inputs.std }}-${{ inputs.config_label }}
          path: build/test/${{ inputs.config_id }}
      - name: Configure CTest Metadata
        shell: pwsh
        run: |
          $testRoot = Join-Path $env:GITHUB_WORKSPACE 'build/test'
          $configRoot = Join-Path $testRoot '${{ inputs.config_id }}'
          $executables = @(Get-ChildItem -Path $configRoot -Filter '*.exe' | Sort-Object Name)
          if ($executables.Count -eq 0) {
            throw "No test executables found in $configRoot"
          }

          New-Item -ItemType Directory -Force -Path $testRoot | Out-Null
          Set-Content -Path 'build/CTestTestfile.cmake' -Value "subdirs(`"test`")`n" -NoNewline

          $lines = @()
          foreach ($executable in $executables) {
            $name = [System.IO.Path]::GetFileNameWithoutExtension($executable.Name)
            $path = $executable.FullName.Replace('\', '/')
            $label = if ($name -eq 'dingo_unit_test') { 'unit' } else { 'runtime' }
            $lines += "add_test([=[$name]=] [=[$path]=])"
            $lines += "set_tests_properties([=[$name]=] PROPERTIES LABELS [=[$label]=])"
          }
          Set-Content -Path 'build/test/CTestTestfile.cmake' -Value ($lines -join "`n") -NoNewline
      - name: Test
        shell: pwsh
        run: |
          ctest --test-dir build --verbose --output-on-failure -C ${{ inputs.config_id }} -LE compile-only
      - name: Upload Failure Artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: failure-${{ inputs.vs_label }}-arm64-native-std-${{ inputs.std }}-${{ inputs.config_label }}
          if-no-files-found: ignore
          path: |
            build/Testing/Temporary
            build/test/Testing/Temporary
            build/CTestTestfile.cmake
            build/test/CTestTestfile.cmake

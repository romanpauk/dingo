name: windows-arm64-leg
on:
  workflow_call:
    inputs:
      source_artifact_name:
        required: false
        type: string
        default: ''
      vs_label:
        required: true
        type: string
      cross_runner:
        required: true
        type: string
      cross_generator:
        required: true
        type: string
      native_generator:
        required: true
        type: string
      config_id:
        required: true
        type: string
      config_label:
        required: true
        type: string
      std:
        required: true
        type: number

env:
  BUILD_JOBS: ${{ vars.DINGO_BUILD_JOBS || '4' }}

jobs:
  cross:
    name: compile
    timeout-minutes: 30
    runs-on: ${{ inputs.cross_runner }}
    steps:
      - name: Setup MSVC Developer Command Prompt
        uses: TheMrMilchmann/setup-msvc-dev@v4.0.0
        with:
          arch: amd64_arm64
      - name: Checkout workflow repo
        uses: actions/checkout@v6.0.2
      - name: Initialize source dir
        shell: bash
        run: |
          echo "SOURCE_DIR=." >> "$GITHUB_ENV"
      - name: Download release source
        if: ${{ inputs.source_artifact_name != '' }}
        uses: actions/download-artifact@v5.0.0
        with:
          name: ${{ inputs.source_artifact_name }}
          path: release-artifacts
      - name: Extract release source
        if: ${{ inputs.source_artifact_name != '' }}
        shell: bash
        run: |
          mkdir -p release-src
          tar -xzf release-artifacts/release-source.tar.gz -C release-src
          echo "SOURCE_DIR=release-src" >> "$GITHUB_ENV"
      - name: CCache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: ${{ inputs.vs_label }}-arm64-${{ inputs.config_id }}-${{ inputs.std }}
          evict-old-files: job
      - name: Configure
        shell: pwsh
        run: |
          cmake -S "${{ env.SOURCE_DIR }}" -B build -G "${{ inputs.cross_generator }}" -A ARM64 -DDINGO_DEVELOPMENT_MODE=ON -DDINGO_BENCHMARK_ENABLED=OFF -DDINGO_EXAMPLES_ENABLED=OFF -DDINGO_CCACHE=ON -DDINGO_TREAT_WARNINGS_AS_ERRORS=ON -DCMAKE_BUILD_TYPE=${{ inputs.config_id }} -DCMAKE_CXX_STANDARD=${{ inputs.std }}
      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config ${{ inputs.config_id }} -j $env:BUILD_JOBS
      - name: Upload ARM64 Test Binaries
        uses: actions/upload-artifact@v4.6.2
        with:
          name: native-test-${{ inputs.vs_label }}-arm64-std-${{ inputs.std }}-${{ inputs.config_label }}
          if-no-files-found: error
          path: |
            build/${{ inputs.config_id }}
      - name: FetchContent
        shell: pwsh
        run: |
          cmake -S "${{ env.SOURCE_DIR }}/test/fetchcontent" -B fetchcontent-build -G "${{ inputs.cross_generator }}" -A ARM64 -DCMAKE_BUILD_TYPE=${{ inputs.config_id }} -DCMAKE_CXX_STANDARD=${{ inputs.std }}
          cmake --build fetchcontent-build --config ${{ inputs.config_id }} -j $env:BUILD_JOBS
      - name: Upload Failure Artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: failure-${{ inputs.vs_label }}-arm64-cross-msvc-std-${{ inputs.std }}-${{ inputs.config_label }}
          if-no-files-found: ignore
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
            build/Testing/Temporary
            fetchcontent-build/CMakeFiles/CMakeOutput.log
            fetchcontent-build/CMakeFiles/CMakeError.log

  native-test:
    name: test
    timeout-minutes: 45
    needs: cross
    runs-on: windows-11-arm
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v6.0.2
      - name: Initialize source dir
        shell: bash
        run: |
          echo "SOURCE_DIR=." >> "$GITHUB_ENV"
      - name: Download release source
        if: ${{ inputs.source_artifact_name != '' }}
        uses: actions/download-artifact@v5.0.0
        with:
          name: ${{ inputs.source_artifact_name }}
          path: release-artifacts
      - name: Extract release source
        if: ${{ inputs.source_artifact_name != '' }}
        shell: bash
        run: |
          mkdir -p release-src
          tar -xzf release-artifacts/release-source.tar.gz -C release-src
          echo "SOURCE_DIR=release-src" >> "$GITHUB_ENV"
      - name: Configure Native CTest Metadata
        shell: pwsh
        run: |
          cmake -S "${{ env.SOURCE_DIR }}" -B build -G "${{ inputs.native_generator }}" -A ARM64 -DDINGO_DEVELOPMENT_MODE=ON -DDINGO_BENCHMARK_ENABLED=OFF -DDINGO_EXAMPLES_ENABLED=OFF -DDINGO_TREAT_WARNINGS_AS_ERRORS=ON -DCMAKE_BUILD_TYPE=${{ inputs.config_id }} -DCMAKE_CXX_STANDARD=${{ inputs.std }}
      - name: Download ARM64 Test Binaries
        uses: actions/download-artifact@v5.0.0
        with:
          name: native-test-${{ inputs.vs_label }}-arm64-std-${{ inputs.std }}-${{ inputs.config_label }}
          path: build/${{ inputs.config_id }}
      - name: Test
        shell: pwsh
        run: |
          ctest --test-dir build --verbose --output-on-failure -C ${{ inputs.config_id }}
      - name: Upload Failure Artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: failure-${{ inputs.vs_label }}-arm64-native-std-${{ inputs.std }}-${{ inputs.config_label }}
          if-no-files-found: ignore
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
            build/Testing/Temporary
